<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <title>Echo</title>
    <script>
      (function () {
        var host = location.hostname;
        var isLocal = host === 'localhost' || host === '127.0.0.1';
        var isEchoHost = host === 'echo-im.cloud' || host === '8.140.194.214';
        if (!isLocal && isEchoHost && location.protocol === 'http:') {
          location.replace('https://echo-im.cloud' + location.pathname + location.search + location.hash);
        }
      })();
    </script>
  </head>
  <body class="overflow-x-hidden">
    <div id="root">
      <div class="app-boot-fallback">
        <div class="app-boot-logo">Echo</div>
        <div class="app-boot-text">正在进入 Echo...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('error', function () {
        var root = document.getElementById('root');
        if (!root || root.dataset.ready === '1') return;
        root.innerHTML = '<div class="app-boot-fallback"><div class="app-boot-logo">Echo</div><div class="app-boot-text">加载失败，请刷新或用系统浏览器打开</div><button class="app-boot-button" onclick="location.reload()">重新加载</button></div>';
      });
      if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
